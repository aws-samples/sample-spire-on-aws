        }
      }
      #############################################

      Notifier "k8sbundle" {
        plugin_data {
          namespace = "spire-system"
        }
      }
    ########## UNCOMMENT THIS BLOCK IN THE KMS STEP #############
      # KeyManager "aws_kms" {
      #   plugin_data {        
      #     region = "us-east-2"
      #     key_identifier_file = "./key_metadata"
      #     key_policy_file = "/run/spire/server/kms/custom-key-policy.json"
      #   }
      # }
    ############################################
    ###### UNCOMMENT THIS BLOCK, ENTER YOUR PCA CA ARN #######
    # UpstreamAuthority "aws_pca" {
    #   plugin_data {
    #       region = "us-east-2"
    #       certificate_authority_arn = "<your_pca_arn>"
    #       ca_signing_template_arn = "arn:aws:acm-pca:::template/SubordinateCACertificate_PathLen0/V1"
    #   }
    # }
    ########################################################
    ###### UNCOMMENT THIS BLOCK, REPLACE WITH YOUR BUCKET NAME #######
    # BundlePublisher "aws_s3" {
    #   plugin_data {
    #       region = "us-east-2"
    #       bucket = "trust-bundle-bucket-<your_account_id>"
    #       object_key = "example.org"
    #       format = "spiffe"
    #   }
    # }
  
    #################################################################
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8080"
      live_path = "/live"
      ready_path = "/ready"
    }

---

# ConfigMap containing the custom KMS key policy.
# Gives the SPIRE server role operational access and the account root full
# access so keys are never orphaned if the role is deleted.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-kms-key-policy
  namespace: spire-system
data:
  custom-key-policy.json: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Sid": "AllowRootFullAccess",
          "Effect": "Allow",
          "Principal": {
            "AWS": "arn:aws:iam::ACCOUNT_ID_PLACEHOLDER:root"
          },
          "Action": "kms:*",
          "Resource": "*"
        },
        {
          "Sid": "AllowSpireServerRoleAccess",
          "Effect": "Allow",
          "Principal": {
            "AWS": "arn:aws:iam::ACCOUNT_ID_PLACEHOLDER:role/spire-server-role-spiffe"
          },
          "Action": [
            "kms:CreateAlias",
            "kms:CreateKey",
            "kms:DescribeKey",
            "kms:GetPublicKey",
            "kms:GetKeyPolicy",
            "kms:PutKeyPolicy",
            "kms:ListKeys",
            "kms:ListAliases",
            "kms:ScheduleKeyDeletion",
            "kms:Sign",
            "kms:UpdateAlias",
            "kms:DeleteAlias"
          ],
          "Resource": "*"
        }
      ]
    }

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-server
  namespace: spire-system
  labels:
    app: spire-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spire-server
  template:
    metadata:
      namespace: spire-system
      labels:
        app: spire-server
    spec:
      serviceAccountName: spire-server
      shareProcessNamespace: true
      containers:
        - name: spire-server
          image: ghcr.io/spiffe/spire-server:1.14.0
          imagePullPolicy: IfNotPresent
          args: ["-config", "/run/spire/server/config/server.conf"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/server/config
              readOnly: true
            - name: spire-kms-key-policy
              mountPath: /run/spire/server/kms/custom-key-policy.json
              subPath: custom-key-policy.json
              readOnly: true
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
        - name: spire-controller-manager
          image: ghcr.io/spiffe/spire-controller-manager:nightly
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 9443
            - containerPort: 8083
              name: healthz
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
          args:
          - "--config=spire-controller-manager-config.yaml"
          volumeMounts:
            - name: spire-server-socket
              mountPath: /spire-server
              readOnly: true
            - name: spire-controller-manager-config
              mountPath: /spire-controller-manager-config.yaml
              subPath: spire-controller-manager-config.yaml
      volumes:
        - name: spire-config
          configMap:
            name: spire-server
        - name: spire-kms-key-policy
          configMap:
            name: spire-kms-key-policy
        - name: spire-server-socket
          emptyDir: {}
        - name: spire-controller-manager-config
          configMap:
            name: spire-controller-manager-config

---

# Service definition for SPIRE server defining the gRPC port.
apiVersion: v1
kind: Service
metadata:
  name: spire-server
  namespace: spire-system
spec:
  type: NodePort
  ports:
    - name: api
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: spire-server

---

# Service definition for SPIRE server bundle endpoint
apiVersion: v1
kind: Service
metadata:
  name: spire-server-bundle-endpoint
  namespace: spire-system
spec:
  type: NodePort
  ports:
    - name: api
      port: 8443
      protocol: TCP
  selector:
    app: spire-server


---
#
# Service definition for SPIRE controller manager webhook
apiVersion: v1
kind: Service
metadata:
  name: spire-controller-manager-webhook-service
  namespace: spire-system
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    app: spire-server

