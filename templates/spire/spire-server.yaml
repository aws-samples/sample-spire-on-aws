    #            region = "us-east-2"
    #       }
    #        connection_string = "dbname=postgres user=spiffe host=<your_db_endpoint> port=5432"
    #    }
    # }
    ###################################################################

      NodeAttestor "k8s_psat" {
        plugin_data {
          clusters = {
            "aws-spire-cluster" = {
              service_account_allow_list = ["spire-system:spire-agent"]
            }
          }
        }
